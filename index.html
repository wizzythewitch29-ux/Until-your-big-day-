<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Until Your Big Day 💙</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- Background -->

<div class="stars"></div>

<div class="moon"></div>

<div class="cloud cloud1"></div>

<div class="cloud cloud2"></div>

<div class="sparkles"></div>

<!-- Main Card -->

<div class="container">

<h1 id="title">
Hello, Baboo 🧸
</h1>

<h2>
You deserve every kind of kindness and happiness. I love you so much.
</h2>

<div id="countdown">

Loading...

</div>

<p class="subtitle">

Every second brings us closer to your birthday.

</p>

<div class="letterButton" id="openLetter">

💌

</div>

<p class="clickText">

Click the letter

</p>

</div>
<!-- Letter Overlay -->

<div id="letterOverlay" class="overlay">

    <div class="letter">

        <div class="paper">

            <h2>To My Baboo 🧸</h2>

            <p id="typedText"></p>

            <button id="continueButton">
                🚪 Come Inside
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
