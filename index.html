<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Until Your Big Day 💙</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>


<body>


<!-- Background -->

<div class="stars"></div>

<div class="moon"></div>

<div class="cloud cloud1"></div>

<div class="cloud cloud2"></div>

<div class="sparkles"></div>



<!-- Main Page -->

<div class="container">


<h1 id="title">
Hello, Baboo 🧸
</h1>


<h2>
You deserve every kind of kindness and happiness. I love you so much.
</h2>


<div id="countdown">
Loading...
</div>


<p class="subtitle">
Every second brings us closer to your birthday.
</p>


<div class="letterButton" id="openLetter">
💌
</div>


<p class="clickText">
Click the letter
</p>


</div>





<!-- Letter + Door Overlay -->

<div id="letterOverlay" class="overlay">


<!-- Letter -->

<div class="letter" id="letterBox">


<div class="paper">


<h2>
To My Baboo 🧸
</h2>


<p id="typedText"></p>


<button id="continueButton">
🚪 Come Inside
</button>


</div>


</div>





<!-- Door -->

<div class="doorScene" id="doorScene">


<div class="doorFrame">


<div class="door" id="door">


<div class="knob"></div>


</div>


</div>


</div>



</div>





<!-- Cozy Room -->


<div id="room" class="room">


<div class="window"></div>


<div class="fireplace"></div>


<div class="rug"></div>


<div class="plant"></div>


<div class="books"></div>


<div class="teddy">
🧸
</div>


<div class="cake">
🎂
</div>


<div class="gift">
🎁
</div>



<div class="you">


<div class="head"></div>

<div class="body"></div>


</div>




<div class="speech" id="speech">

You made it. 💙

</div>



</div>





<script src="script.js"></script>


</body>

</html>
