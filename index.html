<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Until Your Big Day 💙</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="stars"></div>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="moon"></div>

<div class="container">

    <h1>Hello, Baboo 🧸</h1>

    <h2>you deserve every kind of kindness and love</h2>

    <div id="countdown">
        Loading...
    </div>

    <p class="subtitle">
        Every second brings us closer to your birthday.
    </p>

    <div class="envelope" id="openLetter">
        💌
    </div>

    <p class="hint">
        Click the letter
    </p>

</div>

<div id="letterOverlay" class="overlay">

    <div class="letter">

        <h2>To My Baboo 🧸</h2>

        <p id="typedText"></p>

        <button id="continueBtn">
            🚪 Come Inside
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
